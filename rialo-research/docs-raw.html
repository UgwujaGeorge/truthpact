  <script>
        class ScrambleText {
            constructor(element) {
                this.element = element;
                this.originalText = element.textContent;
                this.chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/~`";
                this.isAnimating = false;
                this.init();
            }
            init() {
                this.element.addEventListener('mouseenter', () => this.scramble());
                this.element.addEventListener('mouseleave', () => this.restore());
            }
            getRandomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
            scramble() {
                if (this.isAnimating) return;
                this.isAnimating = true;
                const textLength = this.originalText.length;
                const scrambleSteps = 8;
                const stepDuration = 0.08;
                const tl = gsap.timeline({
                    onComplete: () => {
                        this.isAnimating = false;
                    }
                });
                for (let i = 0; i < scrambleSteps; i++) {
                    tl.to(this.element, {
                        duration: stepDuration,
                        ease: "none",
                        onUpdate: () => {
                            let scrambledText = '';
                            for (let j = 0; j < textLength; j++) {
                                if (i < scrambleSteps / 2) {
                                    scrambledText += this.getRandomChar();
                                } else {
                                    const revealProgress = (i - scrambleSteps / 2) / (scrambleSteps / 2);
                                    const revealIndex = Math.floor(revealProgress * textLength);
                                    if (j < revealIndex) {
                                        scrambledText += this.originalText[j];
                                    } else {
                                        scrambledText += this.getRandomChar();
                                    }
                                }
                            }
                            this.element.textContent = scrambledText;
                        }
                    });
                }
                tl.to(this.element, {
                    duration: 0.1,
                    ease: "none",
                    onUpdate: () => {
                        this.element.textContent = this.originalText;
                    }
                });
            }
            restore() {
                if (!this.isAnimating) return;
                gsap.killTweensOf(this.element);
                const currentText = this.element.textContent;
                const steps = 4;
                const stepDuration = 0.06;
                const tl = gsap.timeline({
                    onComplete: () => {
                        this.element.textContent = this.originalText;
                        this.isAnimating = false;
                    }
                });
                for (let i = 0; i < steps; i++) {
                    tl.to(this.element, {
                        duration: stepDuration,
                        ease: "none",
                        onUpdate: () => {
                            const progress = (i + 1) / steps;
                            const revealCount = Math.floor(progress * this.originalText.length);
                            let restoredText = '';
                            for (let j = 0; j < this.originalText.length; j++) {
                                if (j < revealCount) {
                                    restoredText += this.originalText[j];
                                } else {
                                    restoredText += this.getRandomChar();
                                }
                            }
                            this.element.textContent = restoredText;
                        }
                    });
                }
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                new ScrambleText(link);
            });
        });
    </script>
